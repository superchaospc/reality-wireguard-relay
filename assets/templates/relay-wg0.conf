# /etc/wireguard/wg0.conf on the RELAY (中转) box — WireGuard client.
# Replace {{...}}. The relay carries one tunnel source IP per exit line:
#   .2 primary (/24), .3+ secondaries (/32). Match these to landing SNAT + sendThrough.
#
# KEY POINT: Table = off so wg-quick does NOT touch the host's routes. We add our own
# table 51820 and a rule that selects ONLY proxied traffic (sourced from a tunnel IP).
# This keeps the relay's own SSH/system traffic on its normal route — see pitfall #4.

[Interface]
Address = 10.66.66.2/24, 10.66.66.3/32
PrivateKey = {{RELAY_PRIVATE_KEY}}
Table = off
# MTU 1280: the IPv6 floor, always carryable. The path that carries the WG UDP between
# relay and landing often can't pass a 1420-byte inner packet even when both eth0s and
# an ICMP probe say 1500 (carriers silently cap big UDP). Default 1420 then black-holes
# large TLS handshakes → "most sites hang, a few load" (pitfall #9). 1280 sidesteps it.
MTU = 1280
# default-via-wg in a private table; select proxied traffic by tunnel source IP.
# (the fwmark rule is kept as a belt-and-suspenders path for outbounds that set sockopt.mark)
# Last clause clamps TCP MSS for traffic the relay originates into the tunnel, so even a
# server that ignores PMTU can't send segments too big for the 1280 path.
PostUp = ip route add default dev wg0 table 51820; ip rule add from 10.66.66.0/24 table 51820; ip rule add fwmark 0xff table 51820; iptables -t mangle -A OUTPUT -o wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1200
PostDown = iptables -t mangle -D OUTPUT -o wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1200; ip rule del fwmark 0xff table 51820; ip rule del from 10.66.66.0/24 table 51820; ip route flush table 51820

[Peer]
# landing (落地)
PublicKey = {{LANDING_PUBLIC_KEY}}
Endpoint = {{LANDING_ENDPOINT}}:51820
AllowedIPs = 0.0.0.0/0
PersistentKeepalive = 25
