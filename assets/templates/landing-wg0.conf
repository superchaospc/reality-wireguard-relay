# /etc/wireguard/wg0.conf on the LANDING (落地) box — WireGuard server + NAT exit.
# Replace {{...}}. WAN_IFACE is usually eth0 (check `ip -br addr`).
# Also: echo 'net.ipv4.ip_forward=1' > /etc/sysctl.d/99-wg-forward.conf && sysctl --system
#
# Two NAT modes below — keep ONE block.

[Interface]
Address = 10.66.66.1/24
ListenPort = 51820
PrivateKey = {{LANDING_PRIVATE_KEY}}
# MTU 1280 on BOTH ends (relay too) — see relay-wg0.conf / pitfall #9. The return path
# (internet → landing → tunnel → relay → client) uses this MTU; if only the relay is
# fixed, large UDP/QUIC replies still black-hole here. Keep both at 1280.
MTU = 1280
# The FORWARD MSS-clamp clause below is NAT-mode-independent — it clamps TCP segments
# the landing forwards into the tunnel so big-cert TLS replies fit the 1280 path.

# ---- NAT mode A: SINGLE exit IP (MASQUERADE) ----
# PostUp   = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t mangle -A FORWARD -o wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1200; iptables -t nat -A POSTROUTING -s 10.66.66.0/24 -o {{WAN_IFACE}} -j MASQUERADE
# PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t mangle -D FORWARD -o wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1200; iptables -t nat -D POSTROUTING -s 10.66.66.0/24 -o {{WAN_IFACE}} -j MASQUERADE

# ---- NAT mode B: MULTIPLE exit IPs (per-source SNAT) ----
# One pair of -s <tunnel src>/32 -> --to-source <public IP> per line. Add/remove rows.
PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t mangle -A FORWARD -o wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1200; iptables -t nat -A POSTROUTING -s 10.66.66.2/32 -o {{WAN_IFACE}} -j SNAT --to-source {{EXIT_IP_0}}; iptables -t nat -A POSTROUTING -s 10.66.66.3/32 -o {{WAN_IFACE}} -j SNAT --to-source {{EXIT_IP_1}}
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t mangle -D FORWARD -o wg0 -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1200; iptables -t nat -D POSTROUTING -s 10.66.66.2/32 -o {{WAN_IFACE}} -j SNAT --to-source {{EXIT_IP_0}}; iptables -t nat -D POSTROUTING -s 10.66.66.3/32 -o {{WAN_IFACE}} -j SNAT --to-source {{EXIT_IP_1}}

[Peer]
# relay (中转)
PublicKey = {{RELAY_PUBLIC_KEY}}
AllowedIPs = 10.66.66.0/24
